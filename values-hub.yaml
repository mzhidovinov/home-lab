clusterGroup:
  name: hub
  isHubCluster: true
  # Namespace is a dictionary for easier overriding (lists are supported as well)
  namespaces:
    home-lab:
    vault:
    validated-patterns-secrets:
    external-secrets-operator:
      operatorGroup: true
      targetNamespaces: []
    external-secrets:
    eso-e2e-test:
    mcp-lifecycle-operator-system:
    openshift-mcp-server:
  subscriptions:
    eso:
      name: openshift-external-secrets-operator
      namespace: external-secrets-operator
      channel: stable-v1
  argoProjects:
    - hub
  sharedValueFiles:
    - '/values-secret-store-{{ $.Values.global.secretStore.backend }}.yaml'
  applications:
#    vault:
#      name: vault
#      namespace: vault
#      argoProject: hub
#      chart: hashicorp-vault
#      chartVersion: 0.1.*
    openshift-external-secrets:
      name: openshift-external-secrets
      namespace: external-secrets
      argoProject: hub
      chart: openshift-external-secrets
      chartVersion: 0.0.*
      extraValueFiles:
        - '/values-eso-operator-backend-{{ $.Values.global.secretStore.backend }}.yaml'
    eso-e2e:
      name: eso-e2e
      namespace: eso-e2e-test
      path: charts/home-lab-eso-e2e
      argoProject: hub
    mcp-lifecycle-operator:
      name: mcp-lifecycle-operator
      namespace: mcp-lifecycle-operator-system
      path: charts/mcp-lifecycle-operator
      argoProject: hub
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    mcp-server:
      name: mcp-server
      namespace: openshift-mcp-server
      path: charts/mcp-server
      argoProject: hub
      annotations:
        argocd.argoproj.io/sync-wave: "-5"
