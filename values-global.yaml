---
global:
  pattern: home-lab
  secretLoader:
    disabled: false
  # ESO backend toggle: vault (default) or kubernetes.
  # HashiCorp Vault stays deployed either way; only the ClusterSecretStore changes.
  secretStore:
    backend: kubernetes
  singleArgoCD: true
  options:
    useCSV: false
    syncPolicy: Automatic
    installPlanApproval: Automatic
main:
  clusterGroupName: hub
  multiSourceConfig:
    enabled: true
    clusterGroupChartVersion: "0.9.*"
