{{- if .Values.e2eTest.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: e2e-projection
  namespace: {{ .Values.e2eTest.namespace }}
spec:
  refreshInterval: {{ .Values.e2eTest.refreshInterval }}
  secretStoreRef:
    name: {{ required "secretStore.name is required (from sharedValueFiles overlay)" .Values.secretStore.name }}
    kind: {{ .Values.secretStore.kind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.e2eTest.targetSecret }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.e2eTest.remoteRef.property }}
      remoteRef:
        key: {{ required "e2eTest.remoteRef.key is required (from backend overlay)" .Values.e2eTest.remoteRef.key }}
        property: {{ .Values.e2eTest.remoteRef.property }}
{{- end }}
