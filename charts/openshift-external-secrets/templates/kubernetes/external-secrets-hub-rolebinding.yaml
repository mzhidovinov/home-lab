{{- if and (eq .Values.global.secretStore.backend "kubernetes") (eq (include "ocp_eso.ishubcluster" .) "true") }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-secrets
  namespace: {{ .Values.ocpExternalSecrets.kubernetes.remoteNamespace }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.ocpExternalSecrets.rbac.serviceAccount.name }}
  namespace: {{ .Values.ocpExternalSecrets.rbac.serviceAccount.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: external-secrets
{{- end }}
