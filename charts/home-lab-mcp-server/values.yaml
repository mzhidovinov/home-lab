mcpServer:
  enabled: true
  name: openshift-mcp-server
  namespace: openshift-mcp-server
  image: quay.io/redhat-user-workloads/ocp-mcp-server-tenant/openshift-mcp-server-release-03:latest
  port: 8080
  route:
    enabled: true
    # Defaults to mcp-server.<hubClusterDomain> when empty
    host: ""
  config:
    logLevel: 5
  rbac:
    serviceAccountName: mcp-admin
    # Lab default; use view or a custom ClusterRole for tighter scope
    clusterRoleName: cluster-admin
