{{- if .Values.mcpServer.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.mcpServer.rbac.serviceAccountName }}
  namespace: {{ .Values.mcpServer.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.mcpServer.name }}
    app.kubernetes.io/part-of: mcp-lifecycle-operator
{{- end }}
