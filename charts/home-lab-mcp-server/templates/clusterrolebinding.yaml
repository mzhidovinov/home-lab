{{- if and .Values.mcpServer.enabled .Values.mcpServer.rbac.clusterAdmin }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.mcpServer.name }}-{{ .Values.mcpServer.rbac.serviceAccountName }}
  labels:
    app.kubernetes.io/name: {{ .Values.mcpServer.name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ .Values.mcpServer.rbac.serviceAccountName }}
    namespace: {{ .Values.mcpServer.namespace }}
{{- end }}
